name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # RELEASE_PLEASE_TOKEN (fine-grained PAT: contents + pull-requests write)
      # makes the Release PR trigger pr.yml — the default GITHUB_TOKEN cannot
      # trigger other workflows, which would leave required checks pending.
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
